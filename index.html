<!DOCTYPE html>
<html>
<head>
    <title>Тест</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; border-radius: 15px; padding: 20px; max-width: 300px; margin: 0 auto; }
        .name { font-size: 24px; margin: 10px 0; }
        .balance { font-size: 32px; color: #28a745; margin: 20px 0; }
        input { padding: 10px; width: 200px; margin: 10px; }
        button { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="name" id="name">Загрузка...</div>
        <div class="balance" id="balance">1000 ₽</div>
        <input type="number" id="amount" placeholder="Сумма" value="100">
        <button onclick="withdraw()">Вывести</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('name').textContent = user.first_name;
        }
        
        function withdraw() {
            const amount = parseInt(document.getElementById('amount').value);
            tg.sendData(JSON.stringify({
                action: 'withdraw',
                amount: amount
            }));
            tg.close();
        }
    </script>
</body>
</html>
